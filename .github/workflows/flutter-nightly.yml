name: Build ToRemote

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "server-deploy/**"
  workflow_dispatch:

jobs:
  run-flutter-nightly-build:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
